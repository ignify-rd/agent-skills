name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    # runs-on: ubuntu-latest
    runs-on: [arc-runner-set] # self-hosted runner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Verify CLI help output
        run: node bin/test-genie.js --help

      - name: Verify init command
        run: node bin/test-genie.js init --help

      - name: Verify versions command
        run: node bin/test-genie.js versions --help

      - name: Verify update command
        run: node bin/test-genie.js update --help

      - name: Run npm test
        run: npm test

      - name: Test init --ai claude
        run: |
          mkdir -p /tmp/test-claude
          cd /tmp/test-claude
          node $GITHUB_WORKSPACE/bin/test-genie.js init --ai claude

          # Skill files installed
          test -d .claude/skills/generate-test-case-api
          test -f .claude/skills/generate-test-case-api/SKILL.md
          test -f .claude/skills/generate-test-case-api/AGENTS.md
          test -d .claude/skills/generate-test-case-api/references
          test -d .claude/skills/generate-test-case-api/scripts
          test -d .claude/skills/generate-test-design-api
          test -f .claude/skills/generate-test-design-api/SKILL.md
          test -d .claude/skills/generate-test-design-api/data/rules

          # Skill data NOT copied (catalogs should not be in skill folder)
          test ! -d .claude/skills/generate-test-case-api/data/catalogs
          test ! -d .claude/skills/generate-test-design-api/data/catalogs

          # Project structure created
          test -d catalog/api
          test -d catalog/frontend
          test -d catalog/mobile
          test -f catalog/api/.gitkeep
          test -d excel_template
          test -f AGENTS.md

          echo "✔ claude: skills + project structure installed correctly"

      - name: Test init --ai cursor
        run: |
          mkdir -p /tmp/test-cursor
          cd /tmp/test-cursor
          node $GITHUB_WORKSPACE/bin/test-genie.js init --ai cursor

          # Skill files
          test -d .cursor/skills/generate-test-case-api
          test -f .cursor/skills/generate-test-case-api/SKILL.md
          test -d .cursor/skills/generate-test-design-api
          test -f .cursor/skills/generate-test-design-api/SKILL.md

          # Project structure
          test -d catalog/api
          test -d catalog/frontend
          test -d catalog/mobile
          test -f AGENTS.md

          echo "✔ cursor: skills installed correctly"

      - name: Test init --ai windsurf
        run: |
          mkdir -p /tmp/test-windsurf
          cd /tmp/test-windsurf
          node $GITHUB_WORKSPACE/bin/test-genie.js init --ai windsurf
          test -d .windsurf/rules/generate-test-case-api
          test -f .windsurf/rules/generate-test-case-api/SKILL.md
          test -d catalog/api
          test -f AGENTS.md
          echo "✔ windsurf: skills installed correctly"

      - name: Test init --ai roocode
        run: |
          mkdir -p /tmp/test-roocode
          cd /tmp/test-roocode
          node $GITHUB_WORKSPACE/bin/test-genie.js init --ai roocode
          test -d .roo/rules/generate-test-case-api
          test -f .roo/rules/generate-test-case-api/SKILL.md
          test -d catalog/api
          test -f AGENTS.md
          echo "✔ roocode: skills installed correctly"

      - name: Test init --ai copilot
        run: |
          mkdir -p /tmp/test-copilot
          cd /tmp/test-copilot
          node $GITHUB_WORKSPACE/bin/test-genie.js init --ai copilot
          test -d .github/copilot-skills/generate-test-case-api
          test -f .github/copilot-skills/generate-test-case-api/SKILL.md
          test -d catalog/api
          test -f AGENTS.md
          echo "✔ copilot: skills installed correctly"

      - name: Test init --ai codex
        run: |
          mkdir -p /tmp/test-codex-home /tmp/test-codex-project
          cd /tmp/test-codex-project
          CODEX_HOME=/tmp/test-codex-home node $GITHUB_WORKSPACE/bin/test-genie.js init --ai codex
          test -d /tmp/test-codex-home/skills/generate-test-case-api
          test -f /tmp/test-codex-home/skills/generate-test-case-api/SKILL.md
          test -d /tmp/test-codex-home/skills/generate-test-design-api
          test -f /tmp/test-codex-home/skills/generate-test-design-api/SKILL.md
          test -d catalog/api
          test -f AGENTS.md
          echo "✔ codex: skills installed correctly"

      - name: Test init --ai all
        run: |
          mkdir -p /tmp/test-all /tmp/test-all-codex-home
          cd /tmp/test-all
          CODEX_HOME=/tmp/test-all-codex-home node $GITHUB_WORKSPACE/bin/test-genie.js init --ai all

          # All AI assistant configs created
          test -d .claude/skills/generate-test-case-api
          test -d .cursor/skills/generate-test-case-api
          test -d .windsurf/rules/generate-test-case-api
          test -d .roo/rules/generate-test-case-api
          test -d .github/copilot-skills/generate-test-case-api
          test -d .kiro/rules/generate-test-case-api
          test -d .gemini/skills/generate-test-case-api
          test -d .agent/skills/generate-test-case-api
          test -d /tmp/test-all-codex-home/skills/generate-test-case-api
          test -d .qoder/rules/generate-test-case-api
          test -d .trae/rules/generate-test-case-api
          test -d .opencode/skills/generate-test-case-api
          test -d .continue/skills/generate-test-case-api
          test -d .codebuddy/skills/generate-test-case-api
          test -d .factory/skills/generate-test-case-api

          # Project structure created (only once, shared)
          test -d catalog/api
          test -d catalog/frontend
          test -d catalog/mobile
          test -f AGENTS.md

          echo "✔ all: skills installed for all assistants"

      - name: Test init does not overwrite existing AGENTS.md
        run: |
          mkdir -p /tmp/test-no-overwrite
          cd /tmp/test-no-overwrite
          echo "CUSTOM RULES" > AGENTS.md
          node $GITHUB_WORKSPACE/bin/test-genie.js init --ai claude
          grep -q "CUSTOM RULES" AGENTS.md
          echo "✔ AGENTS.md not overwritten"

      - name: Test unsupported AI type exits with error
        run: |
          node $GITHUB_WORKSPACE/bin/test-genie.js init --ai unknown 2>&1 && exit 1 || echo "✔ unknown AI type correctly rejected"

  install-from-git:
    # runs-on: ubuntu-latest
    runs-on: [arc-runner-set] # self-hosted runner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pack and install (simulates git/npm registry install)
        run: |
          # Pack creates a tarball exactly as npm publish/git install would
          TARBALL=$(npm pack --json | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d)[0].filename))")
          mkdir -p /tmp/consumer
          cd /tmp/consumer
          npm install $GITHUB_WORKSPACE/$TARBALL
          ./node_modules/.bin/test-genie --help
          ./node_modules/.bin/test-genie init --ai claude

          # Skill files
          test -d .claude/skills/generate-test-case-api
          test -f .claude/skills/generate-test-case-api/SKILL.md
          test -d .claude/skills/generate-test-case-api/references
          test -d .claude/skills/generate-test-design-api
          test -f .claude/skills/generate-test-design-api/SKILL.md

          # Project structure
          test -d catalog/api
          test -d catalog/frontend
          test -d catalog/mobile
          test -f AGENTS.md

          echo "✔ npm install and test-genie command work"

      - name: Test init --ai all via installed package
        run: |
          mkdir -p /tmp/consumer-all
          cd /tmp/consumer-all
          TARBALL=$(ls $GITHUB_WORKSPACE/test-genie-*.tgz 2>/dev/null | head -1)
          npm install $TARBALL
          ./node_modules/.bin/test-genie init --ai all
          test -d .claude/skills/generate-test-case-api
          test -d .cursor/skills/generate-test-case-api
          test -d .windsurf/rules/generate-test-case-api
          test -d catalog/api
          test -f AGENTS.md
          echo "✔ init --ai all works via installed package"
